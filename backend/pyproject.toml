[tool.ruff]
target-version = "py312"
src = ["app", "tests", "scripts"]

[tool.ruff.lint]
# Default rule set (E4/E7/E9 + F). Expand deliberately — don't surprise CI.
select = ["E4", "E7", "E9", "F"]

[tool.mypy]
python_version = "3.12"
files = ["app"]
ignore_missing_imports = true
warn_unused_ignores = true
pretty = true
show_error_codes = true
